live_config_reload = true
#import = [
    #"~/.config/alacritty/catppuccin-mocha.toml"
#]
[env]
TERM = "xterm-256color"
[window]
decorations = "buttonless"
dynamic_padding = false
opacity = 0.9

[window.padding]
x = 10
y = 5

[font]
size = 13.0

[font.bold]
family = "JetBrains Mono Nerd Font"
style = "Heavy"

[font.bold_italic]
family = "JetBrains Mono Nerd Font"
style = "Heavy Italic"

[font.italic]
family = "JetBrains Mono Nerd Font"
style = "Medium Italic"

[font.normal]
family = "JetBrains Mono Nerd Font"
style = "Medium"
